<!DOCTYPE html>
<!-- ============================================================
     login.html — The Sign-In Page
     ============================================================
     This is the first page a user sees if they aren't already
     logged in. The middleware (_middleware.js) redirects anyone
     without a valid session to this page.

     The page displays a simple, centred login card with:
       - The dashboard logo and title
       - An email input field
       - A password input field
       - A "Sign In" button
       - An error message area (hidden until there's an error)

     When the user clicks "Sign In", a small JavaScript block
     at the bottom of this page sends the credentials to the
     /api/login endpoint (login.js). If the server says "OK",
     the browser navigates to the dashboard. If not, an error
     message appears on the card.

     The ?next= query parameter: if the middleware redirected the
     user here from another page (e.g. they tried to visit /),
     the original path is passed as ?next=/. After a successful
     login, the script redirects to that path so the user ends
     up exactly where they intended to go.
     ============================================================ -->
<html lang="en">
<head>
  <!-- Standard character encoding declaration. UTF-8 supports
       all languages and special characters. Always include this. -->
  <meta charset="UTF-8" />

  <!-- Makes the page look correct on mobile devices by setting the
       viewport width to the device width and default zoom to 1x. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Sign In — Phil's Traps Dashboard</title>

  <!-- A tiny SVG favicon (the icon shown in the browser tab).
       Instead of a separate .ico file, this uses a data: URL with
       an inline SVG that just displays the target emoji. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1f13;
      --surface:      #132019;
      --surface-2:    #1a2d22;
      --border:       rgba(74, 222, 128, 0.12);
      --border-hover: rgba(74, 222, 128, 0.28);
      --accent:       #4ade80;
      --accent-dim:   #16a34a;
      --accent-glow:  rgba(74, 222, 128, 0.15);
      --text-primary:   #e8f5e9;
      --text-secondary: #81c784;
      --text-muted:     #4a7c59;
      --danger:  #f87171;
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-wordmark {
      display: inline-block;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      margin-bottom: 14px;
    }

    .logo h1 {
      font-size: 1.4rem;
      color: var(--text-primary);
      font-weight: 700;
      margin-bottom: 5px;
      letter-spacing: -0.01em;
    }

    .logo p {
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    input {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--surface-2);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent-dim);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-login:hover  { background: #15803d; }
    .btn-login:active { transform: scale(0.98); }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 13px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 7px;
      color: var(--danger);
      font-size: 0.875rem;
      text-align: center;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <!-- ============================================================
       The login card — the only visible element on the page.
       It is centred by the flexbox styles on <body>.
       ============================================================ -->
  <div class="login-card">

    <!-- Logo area: emoji icon, title, and subtitle -->
    <div class="logo">
      <span class="logo-wordmark">Sandfly</span>
      <h1>Trapping Dashboard</h1>
      <p>Sign in to continue</p>
    </div>

    <!-- The login form.
         novalidate disables the browser's built-in HTML5 validation
         so our JavaScript can handle validation and show nicer
         error messages instead. -->
    <form id="loginForm" novalidate>

      <!-- Email input group -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"   <!-- Lets the browser auto-fill saved email addresses -->
          required
        />
      </div>

      <!-- Password input group.
           type="password" makes the browser display dots instead of
           the actual characters the user types. -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"  <!-- Lets the browser auto-fill saved passwords -->
          required
        />
      </div>

      <!-- The submit button. JavaScript disables it and changes its
           text to "Signing in…" while the login request is in flight,
           to prevent double-submissions. -->
      <button type="submit" class="btn-login" id="submitBtn">Sign In</button>

      <!-- Error message area. Hidden by default. JavaScript shows it
           by adding the "visible" class when login fails. -->
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <!-- ============================================================
       Login Form JavaScript
       This script runs in the browser and handles the form submit
       event. It sends the credentials to the server using fetch()
       (a modern browser API for making HTTP requests without
       reloading the page), then reacts to the server's response.
       ============================================================ -->
  <script src="login.js"></script>
</body>
</html>
